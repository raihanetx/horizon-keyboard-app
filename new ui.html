<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Virtual Keyboard</title>
                <!-- Tailwind CSS CDN -->
                    <script src="https://cdn.tailwindcss.com"></script>
                        <!-- Lucide Icons CDN -->
                            <script src="https://unpkg.com/lucide@latest"></script>
                                <style>
                                        body { background-color: #f0f4f8; font-family: sans-serif; }
                                                .dark body { background-color: #1a202c; }
                                                        .key {
                                                                    transition: transform 0.05s, background-color 0.1s;
                                                                                touch-action: manipulation;
                                                                                        }
                                                                                                .key:active {
                                                                                                            transform: scale(0.96);
                                                                                                                        background-color: #cbd5e1 !important;
                                                                                                                                }
                                                                                                                                        .dark .key:active {
                                                                                                                                                    background-color: #475569 !important;
                                                                                                                                                            }
                                                                                                                                                                </style>
                                                                                                                                                                </head>
                                                                                                                                                                <body class="min-h-screen bg-slate-100 dark:bg-slate-900">

                                                                                                                                                                    <!-- Bottom-docked keyboard container -->
                                                                                                                                                                        <div class="fixed bottom-0 left-0 right-0 w-full bg-gray-200 dark:bg-gray-800 border-t border-gray-300 dark:border-gray-700 shadow-2xl z-50 p-2 pb-8 sm:p-3 sm:pb-10">
                                                                                                                                                                                <div class="w-full max-w-4xl mx-auto flex flex-col gap-2">
                                                                                                                                                                                            
                                                                                                                                                                                                        <!-- Utility Toolbar -->
                                                                                                                                                                                                                    <div class="flex items-center justify-around px-2 py-1 border-b border-gray-300/50 dark:border-gray-700/50 mb-2">
                                                                                                                                                                                                                                    <!-- Keyboard Layout Icon -->
                                                                                                                                                                                                                                                    <button class="p-1.5 text-gray-500 dark:text-gray-400 hover:text-blue-500 dark:hover:text-blue-400 transition-colors focus:outline-none" title="Keyboard Layout">
                                                                                                                                                                                                                                                                        <i data-lucide="keyboard" class="w-5 h-5"></i>
                                                                                                                                                                                                                                                                                        </button>
                                                                                                                                                                                                                                                                                                        <!-- Emoji Icon -->
                                                                                                                                                                                                                                                                                                                        <button class="p-1.5 text-gray-500 dark:text-gray-400 hover:text-blue-500 dark:hover:text-blue-400 transition-colors focus:outline-none" title="Emojis">
                                                                                                                                                                                                                                                                                                                                            <i data-lucide="smile" class="w-5 h-5"></i>
                                                                                                                                                                                                                                                                                                                                                            </button>
                                                                                                                                                                                                                                                                                                                                                                            <!-- Voice Typing Icon -->
                                                                                                                                                                                                                                                                                                                                                                                            <button class="p-1.5 text-gray-500 dark:text-gray-400 hover:text-blue-500 dark:hover:text-blue-400 transition-colors focus:outline-none" title="Voice Typing">
                                                                                                                                                                                                                                                                                                                                                                                                                <i data-lucide="mic" class="w-5 h-5"></i>
                                                                                                                                                                                                                                                                                                                                                                                                                                </button>
                                                                                                                                                                                                                                                                                                                                                                                                                                                <!-- Clipboard Icon -->
                                                                                                                                                                                                                                                                                                                                                                                                                                                                <button class="p-1.5 text-gray-500 dark:text-gray-400 hover:text-blue-500 dark:hover:text-blue-400 transition-colors focus:outline-none" title="Clipboard">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <i data-lucide="clipboard" class="w-5 h-5"></i>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </button>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <!-- Translation Icon -->
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <button class="p-1.5 text-gray-500 dark:text-gray-400 hover:text-blue-500 dark:hover:text-blue-400 transition-colors focus:outline-none" title="Translate">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <i data-lucide="languages" class="w-5 h-5"></i>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </button>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <!-- Settings Icon -->
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <button class="p-1.5 text-gray-500 dark:text-gray-400 hover:text-blue-500 dark:hover:text-blue-400 transition-colors focus:outline-none" title="Settings">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <i data-lucide="settings" class="w-5 h-5"></i>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </button>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <!-- Keyboard Key Grid (Increased vertical gap spacing while preserving exact button heights) -->
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <div id="keyboard-container" class="flex flex-col items-center gap-2 sm:gap-2.5 md:gap-3">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <!-- Rows will be generated by JS -->
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <script>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    const keyboardContainer = document.getElementById('keyboard-container');

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            let isShift = false;

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    const keyLayout = [
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                ['q', 'w', 'e', 'r', 't', 'y', 'u', 'i', 'o', 'p'],
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            ['a', 's', 'd', 'f', 'g', 'h', 'j', 'k', 'l'],
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        ['shift', 'z', 'x', 'c', 'v', 'b', 'n', 'm', 'backspace'],
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    ['123', ',', 'space', '.', 'enter']
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            ];

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    const handleKeyPress = (key) => {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                const event = new CustomEvent('virtual-keyup', { detail: { key } });
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            window.dispatchEvent(event);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    };

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            const handleBackspace = () => {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        const event = new CustomEvent('virtual-backspace');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    window.dispatchEvent(event);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            };

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    const handleSpace = () => {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                handleKeyPress(' ');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        };

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                const handleEnter = () => {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            handleKeyPress('\n');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    };

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            const toggleShift = () => {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        isShift = !isShift;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    renderKeyboard();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            };

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    const renderKeyboard = () => {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                keyboardContainer.innerHTML = '';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            keyLayout.forEach(row => {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            const rowDiv = document.createElement('div');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            // Increased horizontal gap spacing between keys
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            rowDiv.className = 'flex w-full justify-center gap-1.5 sm:gap-2 md:gap-2.5';

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            if (row.includes('a')) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                rowDiv.style.width = '95%';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                row.forEach(key => {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    const keyButton = document.createElement('button');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        keyButton.className = 'key h-10 sm:h-11 md:h-12 flex-1 font-sans text-sm md:text-base rounded-[6px] bg-slate-50 dark:bg-gray-700 text-slate-800 dark:text-white flex items-center justify-center border-b border-gray-300 dark:border-gray-900 focus:outline-none shadow-sm';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                let displayKey = isShift && key.length === 1 ? key.toUpperCase() : key;

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    switch (key) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            case 'backspace':
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        keyButton.innerHTML = `<i data-lucide="backspace" class="w-5 h-5"></i>`;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    keyButton.classList.add('w-10', 'sm:w-12', 'md:w-14', 'flex-none', 'bg-slate-200/80', 'dark:bg-gray-800');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                keyButton.onclick = handleBackspace;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            break;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    case 'shift':
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                keyButton.innerHTML = `<i data-lucide="arrow-up" class="w-5 h-5"></i>`;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            keyButton.classList.add('w-10', 'sm:w-12', 'md:w-14', 'flex-none');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        if(isShift) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        keyButton.classList.add('bg-blue-500', 'text-white', 'dark:bg-blue-600', 'border-blue-700');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        keyButton.classList.remove('bg-slate-50', 'dark:bg-gray-700');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    } else {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    keyButton.classList.add('bg-slate-200/80', 'dark:bg-gray-800');
